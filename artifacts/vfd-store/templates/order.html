{% extends "base.html" %}

{% block title %}طلب شراء - Inverter VFD{% endblock %}

{% block content %}
<style>
    .order-wrapper {
        max-width: 560px;
        margin: 50px auto;
        padding: 0 20px 40px;
    }

    .order-card {
        background: white;
        border-radius: 16px;
        padding: 40px 36px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        border-top: 5px solid #ff6b35;
    }

    .order-card h2 {
        text-align: center;
        font-size: 26px;
        margin-bottom: 8px;
        color: #1a1a2e;
    }

    .order-card .subtitle {
        text-align: center;
        color: #888;
        margin-bottom: 32px;
        font-size: 15px;
    }

    .form-group {
        margin-bottom: 22px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 15px;
    }

    .form-group label span {
        color: #ff6b35;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        font-family: inherit;
        color: #333;
        transition: border-color 0.2s;
        direction: rtl;
        background-color: #fafafa;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #ff6b35;
        background-color: white;
    }

    .form-group input::placeholder {
        color: #aaa;
    }

    .submit-btn {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        margin-top: 10px;
        border-radius: 10px;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
    }

    .back-link:hover {
        color: #ff6b35;
    }

    @media (max-width: 500px) {
        .order-card {
            padding: 28px 20px;
        }
    }
</style>

<div class="order-wrapper">
    <div class="order-card">
        <h2>📋 نموذج الطلب</h2>
        <p class="subtitle">أكمل المعلومات أدناه وسنتصل بك قريباً</p>

        <form method="POST" action="/order">
            <div class="form-group">
                <label for="name">الاسم الكامل <span>*</span></label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="مثال: أحمد بن علي"
                    required
                    minlength="3"
                >
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف <span>*</span></label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="مثال: 0555 123 456"
                    required
                    pattern="[0-9\s\+\-]{9,15}"
                >
            </div>

            <div class="form-group">
                <label for="wilaya">الولاية <span>*</span></label>
                <select id="wilaya" name="wilaya" required>
                    <option value="" disabled selected>-- اختر ولايتك --</option>
                    {% for wilaya in wilayas %}
                    <option value="{{ wilaya }}">{{ wilaya }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="power">القدرة المطلوبة (kW) <span>*</span></label>
                <select id="power" name="power" required>
                    <option value="" disabled selected>-- اختر القدرة --</option>
                    {% for option in power_options %}
                    <option value="{{ option }}">{{ option }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-primary submit-btn">✅ إرسال الطلب</button>
        </form>

        <a href="/" class="back-link">← العودة إلى الصفحة الرئيسية</a>
    </div>
</div>
{% endblock %}
