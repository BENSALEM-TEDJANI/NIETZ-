{% extends "base.html" %}

{% block title %}تسجيل الدخول - NIETZ{% endblock %}

{% block content %}
<style>
    .login-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
    }

    .login-card {
        background: white;
        border-radius: 18px;
        padding: 50px 44px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.12);
        width: 100%;
        max-width: 420px;
        border-top: 5px solid #cc1a1a;
    }

    .login-logo {
        text-align: center;
        margin-bottom: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .login-logo svg {
        height: 44px;
        width: auto;
    }

    .login-logo span { color: #888; font-size: 14px; display: block; font-weight: 400; }

    .login-card h2 {
        text-align: center;
        font-size: 20px;
        color: #555;
        margin-bottom: 30px;
        font-weight: 400;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
    }

    .form-group input {
        width: 100%;
        padding: 13px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        font-family: inherit;
        direction: rtl;
        transition: border-color 0.2s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #cc1a1a;
    }

    .error-box {
        background: #fef2f2;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        padding: 12px 16px;
        color: #dc2626;
        font-size: 14px;
        margin-bottom: 20px;
        text-align: center;
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        font-size: 17px;
        border-radius: 10px;
        margin-top: 6px;
    }

    .default-hint {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #aaa;
        background: #f9f9f9;
        border-radius: 8px;
        padding: 10px;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 46" role="img" aria-label="NIETZ">
                <polygon points="2,4 15,4 26,23 15,42 2,42 13,23" fill="#cc1a1a"/>
                <polygon points="17,4 30,4 41,23 30,42 17,42 28,23" fill="#cc1a1a"/>
                <text x="48" y="33"
                      font-family="'Arial Black','Arial Bold',Arial,sans-serif"
                      font-weight="900"
                      font-size="28"
                      fill="#0d1b2a"
                      letter-spacing="1.5"
                      direction="ltr"
                      unicode-bidi="bidi-override">NIETZ</text>
            </svg>
            <span>لوحة التحكم</span>
        </div>
        <h2>تسجيل الدخول</h2>

        {% if error %}
        <div class="error-box">❌ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" name="username"
                       placeholder="أدخل اسم المستخدم" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password"
                       placeholder="أدخل كلمة المرور" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary login-btn">🔐 دخول</button>
        </form>

        <div class="default-hint">
            الحساب الافتراضي: <strong>admin</strong> / <strong>admin123</strong>
        </div>
    </div>
</div>
{% endblock %}
