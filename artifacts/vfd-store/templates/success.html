{% extends "base.html" %}

{% block title %}تم استلام طلبك - VFD Store{% endblock %}

{% block content %}
<style>
    .success-wrapper {
        max-width: 560px;
        margin: 70px auto;
        padding: 0 20px;
        text-align: center;
    }

    .success-card {
        background: white;
        border-radius: 20px;
        padding: 50px 36px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .checkmark {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, #28a745, #20c997);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 28px;
        box-shadow: 0 6px 20px rgba(40,167,69,0.3);
    }

    .checkmark svg {
        width: 48px;
        height: 48px;
        fill: none;
        stroke: white;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .success-card h2 {
        font-size: 26px;
        color: #1a1a2e;
        margin-bottom: 16px;
    }

    .success-card .message {
        font-size: 20px;
        color: #28a745;
        font-weight: 700;
        margin-bottom: 20px;
        background: #f0fff4;
        border: 2px solid #28a745;
        border-radius: 10px;
        padding: 16px 20px;
    }

    .success-card p {
        color: #666;
        font-size: 16px;
        line-height: 1.7;
        margin-bottom: 32px;
    }

    .actions {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn-secondary {
        background-color: #f0f0f0;
        color: #333;
        border: none;
        padding: 13px 28px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: background-color 0.2s;
    }

    .btn-secondary:hover {
        background-color: #e0e0e0;
    }
</style>

<div class="success-wrapper">
    <div class="success-card">
        <div class="checkmark">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h2>شكراً لك!</h2>

        <div class="message">
            ✅ تم استلام طلبك، سنتصل بك قريباً
        </div>

        <p>
            لقد تلقينا طلبك بنجاح.<br>
            سيتواصل معك أحد أعضاء فريقنا خلال <strong>24 ساعة</strong><br>
            للتأكيد وترتيب عملية الشراء والتوصيل.
        </p>

        <div class="actions">
            <a href="/order" class="btn-primary">طلب آخر</a>
            <a href="/" class="btn-secondary">الصفحة الرئيسية</a>
        </div>
    </div>
</div>
{% endblock %}
