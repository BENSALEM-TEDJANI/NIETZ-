<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inverter VFD الصناعي{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            direction: rtl;
        }

        header {
            background-color: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        header .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff6b35;
            letter-spacing: 1px;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 15px;
            transition: color 0.2s;
        }

        header nav a:hover {
            color: #ff6b35;
        }

        main {
            min-height: calc(100vh - 130px);
        }

        footer {
            background-color: #1a1a2e;
            color: #aaa;
            text-align: center;
            padding: 18px;
            font-size: 14px;
            margin-top: 40px;
        }

        .btn-primary {
            background-color: #ff6b35;
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: inherit;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: #e55a25;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            header nav a {
                margin: 0 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">⚡ VFD Store</div>
        <nav>
            <a href="/">الرئيسية</a>
            <a href="/order">اشترِ الآن</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2025 - VFD Store الجزائر</p>
    </footer>
</body>
</html>
