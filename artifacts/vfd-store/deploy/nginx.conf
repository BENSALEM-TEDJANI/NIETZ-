server {
    listen 80;
    server_name nietz.alllal.com www.nietz.alllal.com;

    # Redirect HTTP to HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    location /static/ {
        alias /var/www/nietz/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# HTTPS block — certbot will fill this automatically after: certbot --nginx -d nietz.alllal.com
